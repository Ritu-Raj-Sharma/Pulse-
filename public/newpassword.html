
<!DOCTYPE html>
<html>
    <!-- make page responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title shown in browser tab -->
    <title>New Password Page</title>
    <!-- main stylesheet -->
    <link rel="stylesheet" href="pulse.css">
    <!-- main JavaScript file -->
    <script src="pulse.js" defer></script>

    <!-- page body, light theme by default -->
    <body class="light" id="darklight">
        <nav>
            <div class="container-top">
                <div style="float: left;" class="logo-image">
                    <!-- logo that links back to homepage -->
                    <a href="homePage.html" class="active logo">
                        <img id="logoimg" src="img/light_logo.png">
                    </a>
                </div>
                <div style="float: right;">
                    <!-- light/dark mode toggle switch -->
                    <label class="switch">
                        <input type="checkbox" value="light" id="toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </nav>

        <!-- main container with hero image and reset form -->
        <div class="container">
            <!-- left side image -->
            <div class="heroimage">
                <img id="heroimg" src="img/light_forget_password.png" alt>
            </div>

            <!-- right side new password form -->
            <div class="content">
                <h2>Pulse+</h2>
                <form>
                    <!-- email input -->
                    <div>
                        <input class="inputs" type="text" placeholder="Email" id="email">
                    </div>
                    <!-- new password input -->
                    <div>
                        <input class="inputs" type="password" placeholder="New Password" id="newPassword">
                    </div>
                    <!-- confirm password input -->
                    <div>
                        <input class="inputs" type="password" placeholder="Confirm Password" id="confirmPassword">
                    </div>

                    <!-- area to show error messages -->
                    <span id="error"></span>

                    <!-- button calls updatePassword() from JS -->
                    <div>
                        <button type="button" class="inputs" id="submit" onclick="updatePassword()">Update</button>
                    </div>
                </form>

                <!-- hidden signup text (kept for layout spacing) -->
                <div style="visibility: hidden;">
                    <b>Don't have an account?
                        <a href="" class="sign">Sign up</a>
                    </b>
                </div>
            </div>
        </div>
    </body>
</html>
