<!DOCTYPE html>
<html>
    <!-- make page responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title shown in browser tab -->
    <title>Login Page</title>
    <!-- main stylesheet -->
    <link rel="stylesheet" href="pulse.css">
    <!-- main JavaScript file -->
    <script src="pulse.js" defer></script>

    <!-- page body, light theme by default -->
    <body class="light" id="darklight">
        <!-- This is the body-->
        <nav>
            <!-- This is the nav bar-->
            <div class="container-top">
                <div style="float: left;" class="logo-image">
                    <!-- logo that links back to homepage -->
                    <a href="homePage.html" class="active logo">
                        <img id="logoimg" src="img/light_logo.png">
                    </a>
                </div>
                <div style="float: right;">
                    <!-- light/dark mode toggle switch -->
                    <label class="switch">
                        <input type="checkbox" value="light" id="toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </nav>

        <!-- main container with hero image and login form -->
        <div class="container">
            <!-- left side image -->
            <div class="heroimage">
                <img id="heroimg" src="img/light_login_image.png" alt>
            </div>

            <!-- right side login form and text -->
            <div class="content">
                <h2>Pulse+</h2>
                <form>
                    <!-- email input -->
                    <div>
                        <input class="inputs" type="text" id="email" placeholder="Email" required>
                    </div>
                    <!-- password input -->
                    <div>
                        <input class="inputs" type="password" id="password" placeholder="Password" required>
                    </div>
                    <!-- submit button calls logIn() in JS -->
                    <div>
                        <button type="button" class="inputs" id="submit" onclick="logIn()">Submit</button>
                    </div>
                </form>

                <!-- error message text-->
                <span id="error"></span>
                <hr>

                <!-- link to password reset page -->
                <div>
                    <a href="newpassword.html" class="forgot">Forgotten your password?</a>
                </div>

                <!-- link to signup page -->
                <div>
                    <b>Don't have an account?
                        <a href="signup.html" class="sign">Signup</a>
                    </b>
                </div>
            </div>
        </div>
    </body>
</html>
