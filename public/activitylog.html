<!doctype html>
<html lang="en">

<head>
    <!-- set character encoding and make page responsive -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title shown in the browser tab -->
    <title>Activity log page</title>
    <!-- link to main stylesheet -->
    <link rel="stylesheet" href="pulse.css" />
    <!-- main JavaScript file (runs after HTML is loaded) -->
    <script src="pulse.js" defer></script>
</head>

<!-- top navigation bar -->
<nav>
    <div class="container-top">
        <div class="logo-image">
            <!-- logo that links back to home page -->
            <a href="homePage.html" class="active logo">
                <img id="logoimg" src="img/light_logo.png">
            </a>
        </div>

        <!-- navigation links -->
        <div class="navigation">
            <div>
                <a class="page" href="activitylog.html">Log
                    Activity</a>
            </div>
            <div>
                <a class="page" href="activityHistory.html">Activity History</a>
            </div>
            <div>
                <a class="page" href="profile.html">Profile</a>
            </div>
        </div>

        <div class="top_buttons">
            <!-- theme switch (light / dark) -->
            <label class="switch">
                <input type="checkbox" value="light" id="toggle">
                <span class="slider round"></span>
            </label>

            <!-- logout button sends user to login page -->
            <form action="login.html">
                <button class="logout" type="submit"><span>Logout</span></button>
            </form>

            <!-- mobile navigation with overlay menu -->
            <div class="nav_replace">
                <!-- full screen overlay menu (hidden by default) -->
                <div id="myNav" class="overlay">
                    <!-- close button for overlay -->
                    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
                    <!-- overlay links and mobile logout button -->
                    <div class="overlay-content">
                        <a href="activitylog.html">Log Activity</a>
                        <a href="activityHistory.html">Activity History</a>
                        <a href="profile.html">Profile</a>
                        <form action="login.html">
                            <button class="logout_mobile" type="submit"><span>Logout</span></button>
                        </form>
                    </div>
                </div>
                <!-- hamburger icon to open overlay menu -->
                <span style="font-size:40px;cursor:pointer" onclick="openNav()">&#9776; </span>
            </div>
        </div>
    </div>
</nav>

<!-- main page body, light theme by default -->
<body class="light" id="darklight">

    <!-- main content container for the activity log page -->
    <div class="main_container">
        <div class="head">
            <!-- icon and title for the page -->
            <div class="image-act">
                <img src="img/calendar-icon.png" alt="img" />
                <h2>Log Activity Details</h2>
            </div>
        </div>

        <!-- form grid with all activity fields -->
        <div class="content_body">

            <!-- activity type select -->
            <div class="form">
                <form class="input_data">
                    <h3>Activity type:</h3>
                    <select class="inputs" name="types" id="types">
                        <option value="running">Running</option>
                        <option value="gym">Gym</option>
                        <option value="swimming">Swimming</option>
                        <option value="cycling">Cycling</option>
                        <option value="studying">Studying</option>
                    </select>
                </form>
            </div>

            <!-- date and time inputs -->
            <div class="form">
                <form class="input_data">
                    <h3>Date & Time:</h3>
                    <input class="inputs" type="date" id="date" name="date" />
                    <input class="inputs" type="time" id="appt" name="appt" />
                </form>
            </div>

            <!-- intensity level select -->
            <div class="form">
                <form class="input_data">
                    <h3>Intensity level:</h3>
                    <select class="inputs" name="Intensity" id="Intensity">
                        <option value="light">Light</option>
                        <option value="moderate">Moderate</option>
                        <option value="heavy">Heavy</option>
                    </select>
                </form>
            </div>

            <!-- activity duration selects (hours and minutes) -->
            <div class="form">
                <form class="input_data">
                    <h3>Activity Duration:</h3>
                    <!-- hours dropdown -->
                    <select class="inputs" name="hours" id="hours">
                        <option disabled selected>Hours</option>
                        <option value="0">0 Hr</option>
                        <option value="1">1 Hr</option>
                        <option value="2">2 Hrs</option>
                        <option value="3">3 Hrs</option>
                        <option value="4">4 Hrs</option>
                        <option value="5">5 Hrs</option>
                        <option value="6">6 Hrs</option>
                        <option value="7">7 Hrs</option>
                        <option value="8">8 Hrs</option>
                        <option value="9">9 Hrs</option>
                        <option value="10">10 Hrs</option>
                        <option value="11">11 Hrs</option>
                        <option value="12">12 Hrs</option>
                    </select>

                    <!-- minutes dropdown -->
                    <select class="inputs" name="minutes" id="minutes">
                        <option disabled selected>Minutes</option>
                        <option value="0">0 min</option>
                        <option value="5">5 min</option>
                        <option value="10">10 min</option>
                        <option value="15">15 min</option>
                        <option value="20">20 min</option>
                        <option value="25">25 min</option>
                        <option value="30">30 min</option>
                        <option value="35">35 min</option>
                        <option value="40">40 min</option>
                        <option value="45">45 min</option>
                        <option value="50">50 min</option>
                        <option value="55">55 min</option>
                    </select>
                </form>
            </div>

        </div>

        <!-- optional journal text area -->
        <div class="foot">
            <h3>Journal(Optional):</h3>
            <textarea placeholder="Start today's journal..." id="journal"></textarea>
        </div>

        <!-- buttons to log or reset the form -->
        <div class="button-container">
            <!-- log activity calls JS function -->
            <button type="button" class="logButton" onclick="logActivity()">Log Activity</button>
            <!-- reset form button (missing () in original JS call, left unchanged) -->
            <button class="resetButton" type="button" onclick="resetActivityForm">Reset Form</button>
        </div>
    </div>
</body>

</html>
